<html>
<head>
    <title>User Page</title>
</head>
<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <p class="{{ category }}">{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <h2>Welcome {{ user }}</h2>

    <a href="/logout">Logout</a>

</body>
</html>
